# Render Blueprint — cria web service + PostgreSQL grátis e conecta tudo.
# Doc: https://render.com/docs/blueprint-spec
databases:
  - name: tialinda-db
    plan: free
    databaseName: tialinda
    user: tialinda

services:
  - type: web
    name: tialinda
    runtime: node
    plan: free                # mude para "starter" depois para evitar cold start
    region: oregon
    branch: main
    autoDeploy: true
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tialinda-db
          property: connectionString
      - key: ADMIN_PASSWORD
        sync: false           # você define no painel do Render
      - key: PIX_KEY
        value: ee9e688b-ee8f-4c7d-86e9-7abc7d971cc6
      - key: PIX_NAME
        value: Wilma Lidia Ribeiro
      - key: PIX_CITY
        value: Santos
      - key: SMTP_HOST
        sync: false           # ex.: smtp.gmail.com
      - key: SMTP_PORT
        value: '587'
      - key: SMTP_USER
        sync: false           # ex.: tialindasac@gmail.com
      - key: SMTP_PASS
        sync: false           # Gmail App Password (16 caracteres)
      - key: MAIL_FROM
        value: tialindasac@tialinda.com.br
      - key: MAIL_ADMIN
        value: tialindasac@tialinda.com.br
